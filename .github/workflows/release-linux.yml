name: Release (Linux)

# Linux build pipeline. Publishes a tarball to a GitHub Release — on a `v*` tag
# push it attaches to that tag's release; on a manual run (workflow_dispatch) it
# creates the tag + release server-side at the dispatched commit.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/attach to (e.g. v0.2.0)"
        required: false
        default: "v0.2.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GUI dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p filament

      - name: Package tarball
        run: |
          stage="filament-linux-x86_64"
          mkdir -p "dist/$stage"
          cp target/release/filament "dist/$stage/"
          cp README.md LICENSE "dist/$stage/"
          tar -C dist -czf "$stage.tar.gz" "$stage"
          ls -la "$stage.tar.gz"

      # Publish to a GitHub Release. On a v* tag push this attaches to that tag's
      # release; on manual dispatch the action creates the tag + release (server
      # side via GITHUB_TOKEN, so it isn't subject to git push restrictions) at
      # the dispatched commit.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: filament-linux-x86_64.tar.gz
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
