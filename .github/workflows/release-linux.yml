name: Release (Linux)

# Linux build pipeline. Publishes a tarball to the GitHub Release when a `v*`
# tag is pushed; manual runs (workflow_dispatch) upload it as a workflow artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write # prune old build artifacts to stay under the storage quota

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GUI dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libfontconfig1-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p filament

      - name: Package tarball
        run: |
          stage="filament-linux-x86_64"
          mkdir -p "dist/$stage"
          cp target/release/filament "dist/$stage/"
          cp README.md LICENSE "dist/$stage/"
          tar -C dist -czf "$stage.tar.gz" "$stage"
          ls -la "$stage.tar.gz"

      # Free quota before uploading: delete any prior artifact with this name so
      # manual runs replace rather than accumulate (Actions keeps a separate
      # version per run for same-named artifacts, which fills the storage quota).
      - name: Prune previous build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const name = 'filament-linux-x86_64';
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            for (const a of artifacts.filter(a => a.name === name)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner, repo: context.repo.repo, artifact_id: a.id,
              });
              core.info(`Deleted stale artifact ${a.id} (${name})`);
            }

      # On main pushes: best-effort artifact (won't red the build if the Actions
      # artifact storage quota is full).
      - name: Upload build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: filament-linux-x86_64
          path: filament-linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 14

      # On v* tags: publish to a GitHub Release (separate from the artifact quota).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: filament-linux-x86_64.tar.gz
