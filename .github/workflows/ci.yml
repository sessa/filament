name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux GUI dev libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libfontconfig1-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test + build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux GUI dev libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libfontconfig1-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo build --release -p filament
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: filament-${{ matrix.os }}
          path: |
            target/release/filament
            target/release/filament.exe
          if-no-files-found: ignore

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check bans advisories sources
