name: Release (macOS)

# macOS build pipeline. Bundles a `Filament.app` on every push to main (as a
# workflow artifact) and attaches it to the GitHub Release when a `v*` tag is
# pushed. The app is unsigned — Gatekeeper will require a right-click → Open on
# first launch (code signing needs Apple Developer secrets, not configured here).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p filament

      - name: Bundle Filament.app
        run: |
          app="dist/Filament.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp packaging/macos/Info.plist "$app/Contents/Info.plist"
          cp target/release/filament "$app/Contents/MacOS/filament"
          chmod +x "$app/Contents/MacOS/filament"
          ditto -c -k --keepParent "$app" filament-macos-arm64.zip
          ls -la filament-macos-arm64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: filament-macos-arm64
          path: filament-macos-arm64.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: filament-macos-arm64.zip
