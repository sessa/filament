name: Release (macOS)

# macOS build pipeline. Publishes a `Filament.app` zip to the GitHub Release when
# a `v*` tag is pushed; manual runs (workflow_dispatch) upload it as a workflow
# artifact. The app is unsigned — Gatekeeper will require a right-click → Open on
# first launch (code signing needs Apple Developer secrets, not configured here).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write # prune old build artifacts to stay under the storage quota

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p filament

      - name: Bundle Filament.app
        run: |
          app="dist/Filament.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp packaging/macos/Info.plist "$app/Contents/Info.plist"
          cp target/release/filament "$app/Contents/MacOS/filament"
          chmod +x "$app/Contents/MacOS/filament"
          ditto -c -k --keepParent "$app" filament-macos-arm64.zip
          ls -la filament-macos-arm64.zip

      # Free quota before uploading: delete any prior artifact with this name so
      # manual runs replace rather than accumulate (Actions keeps a separate
      # version per run for same-named artifacts, which fills the storage quota).
      - name: Prune previous build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const name = 'filament-macos-arm64';
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            for (const a of artifacts.filter(a => a.name === name)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner, repo: context.repo.repo, artifact_id: a.id,
              });
              core.info(`Deleted stale artifact ${a.id} (${name})`);
            }

      # On main pushes: best-effort artifact (won't red the build if the Actions
      # artifact storage quota is full).
      - name: Upload build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: filament-macos-arm64
          path: filament-macos-arm64.zip
          if-no-files-found: error
          retention-days: 14

      # On v* tags: publish to a GitHub Release (separate from the artifact quota).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: filament-macos-arm64.zip
