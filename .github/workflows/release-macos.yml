name: Release (macOS)

# macOS build pipeline. Publishes a `Filament.app` zip to a GitHub Release — on a
# `v*` tag push it attaches to that tag's release; on a manual run
# (workflow_dispatch) it creates the tag + release server-side at the dispatched
# commit. The app is unsigned — Gatekeeper will require a right-click → Open on
# first launch (code signing needs Apple Developer secrets, not configured here).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/attach to (e.g. v0.2.0)"
        required: false
        default: "v0.2.0"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p filament

      - name: Bundle Filament.app
        run: |
          app="dist/Filament.app"
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources"
          cp packaging/macos/Info.plist "$app/Contents/Info.plist"
          cp target/release/filament "$app/Contents/MacOS/filament"
          chmod +x "$app/Contents/MacOS/filament"
          ditto -c -k --keepParent "$app" filament-macos-arm64.zip
          ls -la filament-macos-arm64.zip

      # Publish to a GitHub Release. On a v* tag push this attaches to that tag's
      # release; on manual dispatch the action creates the tag + release (server
      # side via GITHUB_TOKEN, so it isn't subject to git push restrictions) at
      # the dispatched commit.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: filament-macos-arm64.zip
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
