# cargo-deny configuration. CI runs `cargo deny check bans advisories sources`.
# The license check is intentionally not run in CI (the GUI dependency tree
# carries many SPDX licenses); the load-bearing rule here is the serde_yaml ban.

[advisories]
version = 2
yanked = "deny"
# Only fail on *unmaintained* advisories for our own (workspace) dependencies.
# Transitive crates pulled in by iced/wgpu (e.g. `paste`, `yaml-rust`) are
# flagged unmaintained upstream with no available upgrade — out of our control.
# Security vulnerabilities and unsound advisories still fail across the whole tree.
unmaintained = "workspace"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "allow"
# serde_yaml is unmaintained (RUSTSEC-2024-0320). Filament uses serde_norway.
deny = [{ name = "serde_yaml", reason = "unmaintained; use serde_norway instead" }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
version = 2
# Provided for local `cargo deny check licenses`; CI omits this check.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.8
